<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pongsakorn | Motorsports Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ตั้งค่าพื้นฐาน --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* พื้นหลังดาร์กๆ มีแสงสีแดงเข้มๆ เฟดมาจากข้างบน */
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at top, #330000 0%, #0a0a0a 70%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- กล่องหลัก (โครงสร้างแบบปกติ เสถียร 100%) --- */
        .profile-card {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 40, 0, 0.2); /* ขอบสีแดง Scuderia อ่อนๆ */
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- รูปโปรไฟล์ & ชื่อ --- */
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff2800; /* กรอบแดง */
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 40, 0, 0.3);
        }

        .profile-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* --- กล่อง Bio ย่อย --- */
        .bio-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            color: #ddd;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .bio-box .quote {
            font-style: italic;
            margin-bottom: 10px;
            display: block;
        }

        .bio-box .highlight {
            color: #ff2800;
            font-weight: bold;
        }

        /* --- โซเชียลไอคอน --- */
        .social-icons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background: #ff2800;
            border-color: #ff2800;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 40, 0, 0.4);
        }

        /* --- 🎵 กล่องเครื่องเล่นเพลง (YouTube) 🎵 --- */
        .music-widget {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* บีบความสูง iframe ให้โชว์แค่แถบเล่นเพลงด้านล่าง */
        .music-widget iframe {
            width: 100%;
            height: 90px; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        
        <img src="https://i.pravatar.cc/300?img=11" alt="Profile" class="profile-pic">
        <div class="profile-name">Pongsakorn</div>

        <div class="bio-box">
            <span class="quote">"I love motorsports and hobbies where if you fuck up you die."</span>
            <span class="highlight">Favorite Teams:</span><br>
            MotoGP: Aprilia & Ducati<br>
            F1: Scuderia Ferrari<br>
            WEC: Ferrari | WRC: Toyota
        </div>

        <div class="social-icons">
            <a href="https://www.instagram.com/wouldyouguarantee" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@facex26" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@pongsakornPTM" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://github.com/themostpoordev" target="_blank"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.roblox.com/users/profile?username=CGJKGGK" target="_blank"><i class="fa-solid fa-gamepad"></i></a>
        </div>

        <div class="music-widget">
            <iframe 
                src="https://www.youtube.com/embed/7bbYFpvhCcI?start=125" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

    </div>

</body>
</html>
