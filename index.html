<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pongsakorn | Motorsports Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS Reset & Global Settings --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #050505; 
            color: #fff;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            transition: background 0.5s ease;
        }

        /* --- 🏁 ลายคาร์บอนไฟเบอร์สมจริง 🏁 --- */
        .bg-carbon {
            background:
                linear-gradient(27deg, #151515 5px, transparent 5px) 0 5px,
                linear-gradient(207deg, #151515 5px, transparent 5px) 10px 0px,
                linear-gradient(27deg, #222 5px, transparent 5px) 0px 10px,
                linear-gradient(207deg, #222 5px, transparent 5px) 10px 5px,
                linear-gradient(90deg, #1b1b1b 10px, transparent 10px),
                linear-gradient(#1d1d1d 25%, #1a1a1a 25%, #1a1a1a 50%, transparent 50%, transparent 75%, #242424 75%, #242424 100%);
            background-color: #131313;
            background-size: 20px 20px;
        }

        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 999; display: none; opacity: 1; pointer-events: none;
        }

        /* --- หน้า Enter Screen --- */
        #intro {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; position: absolute; z-index: 100;
            background-color: #050505;
            transition: opacity 0.5s ease;
        }
        
        .shift-lights { display: flex; gap: 15px; margin-bottom: 25px; }
        .light { width: 20px; height: 20px; border-radius: 50%; background: #222; transition: all 0.2s ease; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        #intro:hover .l-1 { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        #intro:hover .l-2 { background: #ff0000; box-shadow: 0 0 20px #ff0000; transition-delay: 0.15s; }
        #intro:hover .l-3 { background: #ff0000; box-shadow: 0 0 20px #ff0000; animation: blink 0.15s infinite; animation-delay: 0.3s; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .enter-text { font-size: 20px; font-weight: bold; letter-spacing: 4px; color: #444; transition: color 0.3s; text-transform: uppercase; }
        #intro:hover .enter-text { color: #fff; text-shadow: 0 0 10px #ff0000; }

        /* --- หน้าหลัก --- */
        #main {
            display: none; 
            min-height: 100vh; flex-direction: column; align-items: center;
            padding: 60px 20px; opacity: 0; transition: opacity 1s ease-in;
            position: relative;
            z-index: 10;
        }
        
        .profile-img {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid #2a2a2a; object-fit: cover; margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            transition: border-color 0.3s;
        }
        .profile-img:hover { border-color: #ff0000; } 

        .profile-name {
            font-size: 24px; font-weight: bold; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            text-align: center;
        }

        /* 🏎️ เอฟเฟกต์ F1 Drive-By Reveal 🏎️ */
        .bio-wrapper {
            position: relative;
            width: 100%; max-width: 600px;
            margin-bottom: 45px;
            overflow: hidden; /* ซ่อนรถตอนมันยังไม่วิ่งเข้ามา และตอนวิ่งออกไป */
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 0, 0.2); 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3), inset 0 0 10px rgba(0,0,0,0.8); 
            background: rgba(0,0,0,0.75); 
        }

        .bio-container {
            padding: 20px; 
            color: #ccc; font-size: 15px; line-height: 1.8; text-align: center;
            /* ซ่อนข้อความทั้งหมดจากด้านขวาด้วย clip-path */
            clip-path: inset(0 100% 0 0); 
        }

        .f1-car {
            position: absolute;
            top: 50%;
            left: -100px; /* เริ่มต้นซ่อนอยู่นอกจอฝั่งซ้าย */
            transform: translateY(-50%);
            font-size: 35px;
            z-index: 10;
            filter: drop-shadow(5px 0 2px rgba(255,0,0,0.5)); /* เงาแดงวิ่งตาม */
        }

        /* คลาสที่ใช้สั่งให้ทำงานตอนเปลี่ยนหน้า */
        .run-animation .f1-car {
            /* รถวิ่งจากซ้ายไปขวา ใช้เวลา 1.5 วิ */
            animation: driveCar 1.5s ease-in-out forwards;
        }
        .run-animation .bio-container {
            /* ข้อความเปิดตามหลังรถ ใช้เวลา 1.5 วิ เท่ากัน */
            animation: revealText 1.5s ease-in-out forwards;
        }

        @keyframes driveCar {
            0% { left: -50px; }
            100% { left: 100%; } /* ทะลุกล่องไปเลย */
        }
        @keyframes revealText {
            0% { clip-path: inset(0 100% 0 0); }
            100% { clip-path: inset(0 0 0 0); } /* เปิดข้อความจนสุด */
        }

        /* ปุ่มลิงก์ */
        .links-container { display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 480px; }
        .link-btn {
            display: flex; align-items: center; padding: 18px 25px;
            background: #111; color: #eee; text-decoration: none; font-size: 18px; font-weight: bold; letter-spacing: 1px;
            border: 2px solid #222; border-radius: 4px; 
            transform: skewX(-6deg); transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .link-btn i, .link-btn span { transform: skewX(6deg); }
        .link-btn i { margin-right: 18px; font-size: 26px; width: 35px; text-align: center; color: #fff; }
        .link-btn:hover {
            border-color: #ff0000; background: #1a1a1a; color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(255, 0, 0, 0.2);
            transform: skewX(-6deg) scale(1.03); 
        }
        
        .quote-style { font-style: italic; color: #999; }
        .fav-title { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="intro">
        <div class="shift-lights">
            <div class="light l-1"></div>
            <div class="light l-2"></div>
            <div class="light l-3"></div>
        </div>
        <div class="enter-text">[ Click to enter ]</div>
    </div>

    <div id="main">
        <img src="https://i.pravatar.cc/300?img=11" alt="Profile" class="profile-img">
        <div class="profile-name">Pongsakorn Phanthumit</div>
        
        <div class="bio-wrapper" id="bio-wrapper">
            <div class="f1-car">🏎️💨</div>
            <div class="bio-container">
                <span class="quote-style">"I love motorsports and hobbies where if you fuck up you die."</span><br><br>
                <span class="fav-title">Favorite Teams:</span><br>
                MotoGP: Aprilia & Ducati<br>
                F1: Scuderia Ferrari<br>
                WEC: Ferrari | WRC: Toyota
            </div>
        </div>

        <div class="links-container">
            <a href="https://github.com/themostpoordev" target="_blank" class="link-btn">
                <i class="fa-brands fa-github"></i><span>themostpoordev</span>
            </a>
            <a href="https://www.roblox.com/users/profile?username=CGJKGGK" target="_blank" class="link-btn">
                <i class="fa-solid fa-gamepad"></i><span>CGJKGGK (Roblox)</span>
            </a>
            <a href="https://open.spotify.com/user/pongsakorn" target="_blank" class="link-btn">
                <i class="fa-brands fa-spotify" style="color: #1DB954;"></i><span>pongsakorn</span>
            </a>
            <a href="https://www.tiktok.com/@facex26" target="_blank" class="link-btn">
                <i class="fa-brands fa-tiktok"></i><span>facex26</span>
            </a>
            <a href="https://www.xbox.com/play/user/RuSure9496" target="_blank" class="link-btn">
                <i class="fa-brands fa-xbox" style="color: #107C10;"></i><span>RuSure9496</span>
            </a>
            <a href="https://www.youtube.com/@pongsakornPTM" target="_blank" class="link-btn">
                <i class="fa-brands fa-youtube" style="color: #FF0000;"></i><span>pongsakorn PTM</span>
            </a>
            <a href="https://www.instagram.com/wouldyouguarantee" target="_blank" class="link-btn">
                <i class="fa-brands fa-instagram" style="color: #E1306C;"></i><span>wouldyouguarantee</span>
            </a>
        </div>
    </div>

    <script>
        const intro = document.getElementById('intro');
        const main = document.getElementById('main');
        const flash = document.getElementById('flash');
        const bioWrapper = document.getElementById('bio-wrapper');

        intro.addEventListener('click', () => {
            flash.style.display = 'block';
            setTimeout(() => {
                flash.style.opacity = '0';
                flash.style.transition = 'opacity 0.6s ease-out';
            }, 50); 
            
            setTimeout(() => {
                intro.style.display = 'none'; 
                flash.style.display = 'none'; 
                
                document.body.style.overflow = 'auto';
                document.body.classList.add('bg-carbon');
                
                main.style.display = 'flex'; 
                
                setTimeout(() => {
                    main.style.opacity = '1'; 
                    // พอหน้าเว็บสว่างปุ๊บ สั่งให้รถ F1 ออกตัวทันที!
                    bioWrapper.classList.add('run-animation');
                }, 100);
            }, 500); 
        });
    </script>
</body>
</html>
