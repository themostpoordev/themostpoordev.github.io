<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pongsakorn | Personal Website</title>
<style>
/* --- ตั้งค่าพื้นฐาน --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #0d0d0d;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  background-image:
    radial-gradient(circle at top, #2a0000 0%, #0d0d0d 60%), /* แสงเรืองแดงด้านบน */
    linear-gradient(135deg, rgba(255, 0, 0, 0.05) 0%, rgba(255, 0, 0, 0) 50%), /* ลูกเล่นเส้นสีแดง */
    repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 5px); /* ลายคาร์บอนไฟเบอร์จางๆ */
}

/* --- จัดการกล่องบน --- */
.card {
  background: rgba(15, 15, 15, 0.95);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 40, 0, 0.2); /* ขอบเรืองแสงสีแดง */
  border-radius: 16px;
  padding: 30px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.profile-pic {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff2800; /* ขอบวงกลมเรืองแสงสีแดง */
  margin-bottom: 12px;
  box-shadow: 0 0 15px rgba(255, 40, 0, 0.4);
}

.name {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}

/* ส่วน Bio */
.bio {
  width: 100%;
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  padding: 16px;
  font-size: 14px;
  color: #ccc;
  text-align: center;
  line-height: 1.6;
  margin-bottom: 25px;
}

.bio-quote {
  font-style: italic;
  color: #fff;
  margin-bottom: 10px;
  display: block;
}

.bio-teams {
  color: #ff2800; /* สีแดง Scuderia */
  font-weight: bold;
}

/* ไอคอนโซเชียลมีเดีย */
.social-icons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 25px;
}

.social-icons a {
  width: 42px;
  height: 42px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: #fff;
  font-size: 18px;
  text-decoration: none;
  transition: all 0.3s ease;
}

.social-icons a:hover {
  background: #ff2800;
  border-color: #ff2800;
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(255, 40, 0, 0.4);
}

/* ลายน้ำกำกับ */
.watermark {
  font-size: 10px;
  color: #555;
  text-align: center;
}

/* --- จัดการกล่องล่าง (เพลง) --- */
.spotify-embed {
  margin-top: 20px;
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
}

.spotify-embed iframe {
  width: 100%;
  height: 80px;
  display: block;
}
</style>
</head>
<body>

  <div class="card">
    <img src="https://themostpoordev.github.io/images/pongsakorn.jpg" alt="Profile Picture" class="profile-pic">
    <div class="name">Pongsakorn</div>

    <div class="bio">
      <span class="bio-quote">"I love motorsports and hobbies where if you fuck up you die."</span>
      <span class="bio-teams">Favorite Teams:</span><br>
      MotoGP: Aprilia & Ducati<br>
      F1: Scuderia Ferrari<br>
      WEC: Ferrari | WRC: Toyota
    </div>

    <div class="social-icons">
      <a href="https://github.com/yourusername" target="_blank"><i></i></a>
      <a href="https://www.roblox.com/users/profile?username=yourusername" target="_blank"><i></i></a>
      <a href="https://open.spotify.com/user/yourusername" target="_blank"><i></i></a>
      <a href="https://www.tiktok.com/@yourusername" target="_blank"><i></i></a>
      <a href="https://www.xbox.com/play/user/yourusername" target="_blank"><i></i></a>
      <a href="https://www.youtube.com/@yourusername" target="_blank"><i></i></a>
      <a href="https://www.instagram.com/yourusername" target="_blank"><i></i></a>
    </div>

    <div class="watermark">
      MADE BY PONGSAKORN • @YOUR_INSTAGRAM • (C) 2026
    </div>
  </div>

  <div class="spotify-embed">
    <iframe src="https://open.spotify.com/embed/track/1801488335?start=110&enablejsapi=1" allow="autoplay"></iframe>
  </div>

</body>
</html>
