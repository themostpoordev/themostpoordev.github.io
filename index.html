<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pongsakorn | Motorsports Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- ตั้งค่าพื้นฐาน --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* พื้นหลังดำดาร์กๆ คลีนๆ */
            background-color: #050505; 
            background-image: radial-gradient(circle at 50% 0%, #3a0000 0%, #050505 60%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* ไม่ให้จอขยับ */
        }

        /* --- กล่องหลัก (สไตล์ Spotify Player / guns.lol) --- */
        .player-card {
            width: 100%;
            max-width: 380px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* --- รูปปกทีม (Cover Art) --- */
        .cover-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* ใส่รูปรถ Ferrari F1 เท่ๆ */
            display: block;
        }

        /* --- ข้อมูลชื่อ (Song Title) --- */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .title-group h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .title-group p {
            font-size: 14px;
            color: #ff2800; /* สีแดง Ferrari */
            font-weight: 600;
        }

        .heart-icon {
            color: #ff2800;
            font-size: 20px;
        }

        /* --- กล่อง Bio ย่อย (สไตล์ guns.lol) --- */
        .bio-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            font-size: 13px;
            color: #b3b3b3;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .bio-box .quote {
            font-style: italic;
            color: #ddd;
            margin-bottom: 10px;
            display: block;
            text-align: center;
        }

        .bio-box .teams {
            font-size: 12px;
        }

        .bio-box .highlight {
            color: #ff2800;
            font-weight: bold;
        }

        /* --- แถบเล่นเพลงหลอกๆ (Fake Progress Bar) --- */
        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
            margin-bottom: 8px;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 75%; /* จำลองว่าเล่นไปแล้ว 75% */
            background: #fff;
            border-radius: 2px;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .player-card:hover .progress-fill::after {
            opacity: 1; /* จุดขาวๆ โผล่มาตอนเอาเมาส์ชี้แบบ Spotify */
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a0a0a0;
        }

        /* --- โซเชียลไอคอน (ปุ่ม Control เพลง) --- */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .controls a {
            color: #fff;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
            opacity: 0.8;
        }

        .controls a.play-btn {
            font-size: 42px; /* ปุ่มกลางใหญ่สุด */
            opacity: 1;
        }

        .controls a:hover {
            opacity: 1;
            transform: scale(1.1);
            color: #ff2800; /* ชี้แล้วเปลี่ยนเป็นสีแดง */
        }

    </style>
</head>
<body>

    <div class="player-card">
        
        <div class="cover-art">
            <img src="https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=800&auto=format&fit=crop" alt="Scuderia Ferrari Cover">
        </div>

        <div class="header-info">
            <div class="title-group">
                <h1>Pongsakorn</h1>
                <p>Motorsports Hub</p>
            </div>
            <i class="fa-solid fa-heart heart-icon"></i>
        </div>

        <div class="bio-box">
            <span class="quote">"I love motorsports and hobbies where if you fuck up you die."</span>
            <div class="teams">
                <span class="highlight">Favorite Teams:</span><br>
                MotoGP: Aprilia & Ducati<br>
                F1: Scuderia Ferrari<br>
                WEC: Ferrari | WRC: Toyota
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-labels">
                <span>1:16</span>
                <span>-2:04</span>
            </div>
        </div>

        <div class="controls">
            <a href="https://github.com/themostpoordev" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.tiktok.com/@facex26" target="_blank" title="TikTok"><i class="fa-solid fa-backward-step"></i></a> <a href="https://www.youtube.com/@pongsakornPTM" target="_blank" class="play-btn" title="YouTube"><i class="fa-solid fa-circle-play"></i></a>
            
            <a href="https://www.instagram.com/wouldyouguarantee" target="_blank" title="Instagram"><i class="fa-solid fa-forward-step"></i></a> <a href="https://www.roblox.com/users/profile?username=CGJKGGK" target="_blank" title="Roblox"><i class="fa-solid fa-gamepad"></i></a>
        </div>

    </div>

</body>
</html>
