<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pongsakorn | Personal Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff2800; /* Ferrari Red */
            --glass: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #020202;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            margin: 0;
            /* พื้นหลังลายตารางจางๆ แบบเว็บ Dev */
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* แสงออร่าสีแดงวิ่งตามเมาส์ */
        #glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 40, 0, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- กล่องโปรไฟล์ Glassmorphism --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .profile-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            padding: 4px;
            background: #000;
        }

        /* วงแหวนหมุนรอบรูป */
        .profile-wrap::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: spin 4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .name {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio-text {
            font-size: 13.5px;
            color: #aaa;
            line-height: 1.6;
            margin: 15px 0 25px;
        }

        .bio-text b { color: var(--primary); }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .social-grid a {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-grid a:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 40, 0, 0.3);
        }

        .watermark {
            margin-top: 25px;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            font-weight: 600;
        }

        /* --- กล่องเพลง Spotify Style --- */
        .spotify-widget {
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .song-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: url('https://img.youtube.com/vi/7bbYFpvhCcI/hqdefault.jpg') center/cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .play-btn-circle {
            width: 38px;
            height: 38px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: auto;
            font-size: 16px;
            transition: 0.2s;
        }

        .play-btn-circle:hover { transform: scale(1.1); background: var(--primary); color: #fff; }

        #yt-player { position: absolute; width: 0; height: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="glow"></div>

    <div class="container">
        <div class="glass-card">
            <div class="profile-wrap">
                <img src="https://cdn.phototourl.com/free/2026-04-03-b7b85193-d0ad-4625-ac94-2b4013d9699d.webp" class="profile-img">
            </div>
            
            <h1 class="name">PONGSAKORN</h1>
            
            <div class="bio-text">
                <i>"I love motorsports and hobbies where if you fuck up you die."</i><br><br>
                <b>Favorite Teams:</b><br>
                MotoGP: Aprilia & Ducati | F1: Scuderia Ferrari<br>
                WEC: Ferrari | WRC: Toyota
            </div>

            <div class="social-grid">
                <a href="https://github.com/themostpoordev" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://www.tiktok.com/@facex26" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://www.instagram.com/wouldyouguarantee" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.youtube.com/@pongsakornPTM" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://www.xbox.com/play/user/RuSure9496" target="_blank"><i class="fa-brands fa-xbox"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-spotify"></i></a>
            </div>

            <div class="watermark">HANDCRAFTED BY PONGSAKORN • © 2026</div>
        </div>

        <div class="spotify-widget">
            <div class="song-cover"></div>
            <div style="flex: 1; min-width: 0;">
                <div style="font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">ไม่เคยถูกรัก (Never Been Loved)</div>
                <div style="font-size: 11px; color: #777;">URBOYTJ FT. Three Man Down</div>
            </div>
            <div class="play-btn-circle" id="playBtn">
                <i class="fa-solid fa-play"></i>
            </div>
        </div>
    </div>

    <iframe id="yt-player" src="https://www.youtube.com/embed/7bbYFpvhCcI?enablejsapi=1&start=120" allow="autoplay"></iframe>

    <script>
        // แสงวิ่งตามเมาส์
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // ควบคุมเพลง
        const player = document.getElementById('yt-player').contentWindow;
        const playBtn = document.getElementById('playBtn');
        let isPlaying = false;

        playBtn.onclick = () => {
            if(!isPlaying) {
                player.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                isPlaying = true;
            } else {
                player.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                isPlaying = false;
            }
        };
    </script>
</body>
</html>
